<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Drone Delivery Pilot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Agentic Drone Delivery Pilot</h1>
            <p>Autonomous navigation and dynamic rerouting</p>
        </header>

        <main>
            <div class="controls">
                <button id="start-mission-btn">Start Delivery Mission</button>
            </div>

            <div class="mission-status" id="mission-status">
                Status: Awaiting Dispatch
            </div>

            <div class="agent-log-container">
                <h2>Agent Reasoning Log</h2>
                <div id="agent-log" class="agent-log"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
