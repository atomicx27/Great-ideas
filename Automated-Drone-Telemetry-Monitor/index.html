<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Drone Telemetry Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Automated Drone Telemetry Monitor</h1>
            <p>Deterministic, rule-based monitoring of drone fleets.</p>
        </header>

        <main>
            <section class="monitor-section">
                <h2>Monitor Drones</h2>
                <div class="controls">
                    <button id="monitor-drones-btn">Check Telemetry</button>
                </div>
                <div id="results-output" class="results-container">
                    <p>Click "Check Telemetry" to process.</p>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
