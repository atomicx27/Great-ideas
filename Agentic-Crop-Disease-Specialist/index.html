<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agentic Crop Disease Specialist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Agentic Crop Disease Specialist</h1>
        <p>This agent autonomously investigates crop symptoms using simulated agricultural databases to recommend treatment.</p>

        <div class="controls">
            <input type="text" id="symptom-input" value="Leaves have yellow spots and a white powdery substance." style="width: 350px; padding: 8px;">
            <button id="diagnose-btn">Start Diagnosis Agent</button>
        </div>

        <div id="output-log" class="log-container"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
