<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Nanobot Medic</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container fade-up">
        <h1>Agentic Nanobot Medic</h1>

        <div class="input-section">
            <label for="symptoms">Patient Symptoms & Vitals:</label>
            <textarea id="symptoms" rows="4" placeholder="e.g., Patient exhibits rapid heart rate, localized swelling in lower right abdomen..."></textarea>

            <button id="diagnoseBtn">Analyze & Formulate Treatment</button>
        </div>

        <div class="output-section">
            <h2>Nanobot Treatment Plan:</h2>
            <div id="treatmentLog" class="status-box">Awaiting data...</div>
        </div>
    </div>

    <script src="../shared/llm-api.js"></script>
    <script src="script.js"></script>
</body>
</html>
