<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Grid Load Balancer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Agentic Grid Load Balancer</h1>
        <p>An autonomous agent that monitors grid load and acts to prevent collapse.</p>

        <div class="card">
            <h2>Scenario Input</h2>
            <form id="balancer-form">
                <label for="prompt">Describe grid status:</label>
                <textarea id="prompt" rows="3" required placeholder="e.g., Load is spiking due to a sudden heatwave."></textarea>
                <button type="button" id="run-btn">Deploy Agent</button>
            </form>
        </div>

        <div class="card result-card" id="output-card">
            <h2>Agent Log</h2>
            <div id="output-log"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
