<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Automated Drone Dispatcher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Automated Drone Dispatcher</h1>
            <p>Deterministic Drone Assignment based on weight and distance.</p>
        </header>

        <main>
            <section class="dispatch-form-section">
                <h2>New Package Dispatch</h2>
                <form id="dispatch-form">
                    <div class="form-group">
                        <label for="weight">Package Weight (kg):</label>
                        <input type="number" id="weight" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label for="distance">Delivery Distance (km):</label>
                        <input type="number" id="distance" step="0.1" required>
                    </div>
                    <button type="submit">Assign Drone</button>
                </form>
            </section>

            <section class="result-section">
                <h2>Dispatch Assignment</h2>
                <div id="output" class="output">
                    <p>Awaiting input...</p>
                </div>
            </section>
        </main>
    </div>

    <div id="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
