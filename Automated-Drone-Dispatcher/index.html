<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Drone Dispatcher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Automated Drone Dispatcher</h1>
            <p>Deterministic, rule-based drone assignment logic.</p>
        </header>

        <main>
            <section class="form-section">
                <h2>Dispatch Request</h2>
                <form id="dispatch-form">
                    <div class="form-group">
                        <label for="weight">Package Weight (kg):</label>
                        <input type="number" id="weight" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label for="distance">Delivery Distance (km):</label>
                        <input type="number" id="distance" step="0.1" required>
                    </div>
                    <button type="submit">Evaluate & Dispatch</button>
                </form>
            </section>

            <section class="routing-section">
                <h2>Assignment Decision</h2>
                <div id="routing-output" class="output-container">
                    <p>Enter package details to see dispatch assignment.</p>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
