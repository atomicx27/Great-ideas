<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Deflection Strategist</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header>
        <h1>Agentic Deflection Strategist</h1>
        <p>Autonomous Threat Mitigation Planner</p>
    </header>

    <main class="container">
        <section class="control-panel">
            <h2>Asteroid Threat Profile</h2>
            <div class="input-group">
                <label for="comp-input">Composition:</label>
                <select id="comp-input">
                    <option value="Silicate">Silicate (Stony)</option>
                    <option value="Metallic">Metallic (Iron/Nickel)</option>
                    <option value="Carbonaceous">Carbonaceous (Loose Rubble)</option>
                </select>
            </div>
            <div class="input-group">
                <label for="size-input">Diameter (meters):</label>
                <input type="number" id="size-input" value="300" min="50" max="5000">
            </div>
            <div class="input-group">
                <label for="time-input">Time to Impact (Years):</label>
                <input type="number" id="time-input" value="3" min="0.1" max="20" step="0.1">
            </div>

            <hr>

            <div class="input-group">
                <label for="llm-provider">LLM Provider:</label>
                <select id="llm-provider">
                    <option value="openai">OpenAI</option>
                    <option value="anthropic">Anthropic</option>
                    <option value="ollama">Ollama (Local)</option>
                </select>
            </div>
            <div class="input-group">
                <label for="api-key">API Key / Base URL:</label>
                <input type="password" id="api-key" placeholder="Enter key or http://localhost:11434">
            </div>

            <button id="strategize-btn" class="primary-btn">Generate Defense Strategy</button>
            <p id="status-text" class="status-indicator">Status: Waiting for threat profile.</p>
        </section>

        <section class="results-panel">
            <h2>AI Strategy Log</h2>
            <div id="results-display" class="log-box">Ready to simulate deflection strategy...</div>
        </section>
    </main>

    <script src="../shared/llm-api.js"></script>
    <script src="script.js"></script>
</body>
</html>
