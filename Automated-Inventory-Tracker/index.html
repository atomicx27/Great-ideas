<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Inventory Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Automated Inventory Tracker</h1>
            <p>Deterministic, rule-based stock management system.</p>
        </header>

        <main>
            <section class="add-item-section">
                <h2>Add New Item</h2>
                <form id="add-item-form">
                    <div class="form-group">
                        <label for="item-name">Item Name:</label>
                        <input type="text" id="item-name" required>
                    </div>
                    <div class="form-group">
                        <label for="item-quantity">Initial Quantity:</label>
                        <input type="number" id="item-quantity" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="item-threshold">Low Stock Threshold:</label>
                        <input type="number" id="item-threshold" min="1" required>
                    </div>
                    <button type="submit">Add Item</button>
                </form>
            </section>

            <section class="inventory-section">
                <h2>Current Inventory</h2>
                <table id="inventory-table">
                    <thead>
                        <tr>
                            <th>Item ID</th>
                            <th>Item Name</th>
                            <th>Quantity</th>
                            <th>Threshold</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-body">
                        <!-- Inventory rows will be dynamically populated here -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
