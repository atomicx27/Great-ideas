<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Neural Signal Filter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Automated Neural Signal Filter</h1>
        <p>Deterministic BCI Noise Reduction</p>
    </header>

    <main class="container">
        <section class="control-panel">
            <h2>Filter Controls</h2>
            <div class="input-group">
                <label for="hz-threshold">High-Pass Filter Threshold (Hz):</label>
                <input type="number" id="hz-threshold" value="30" />
            </div>
            <button id="filter-btn" class="primary-btn">Process Neural Array</button>
            <p id="status-text" class="status-indicator">Status: Idle</p>
        </section>

        <section id="results-panel" class="hidden">
            <h2>Signal Output</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Raw Signals</h3>
                    <p id="raw-count">0</p>
                </div>
                <div class="stat-card">
                    <h3>Filtered Signals</h3>
                    <p id="filtered-count">0</p>
                </div>
            </div>

            <div class="log-container">
                <h3>Processed Signals</h3>
                <table id="signal-log">
                    <thead>
                        <tr>
                            <th>Channel ID</th>
                            <th>Raw Frequency</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
