<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Carbon Footprint Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Automated Carbon Footprint Calculator</h1>
            <p>Deterministic, rules-based enterprise emissions tracking.</p>
        </header>

        <main>
            <section class="calculator-section">
                <h2>Calculate Monthly Emissions</h2>
                <div class="input-group">
                    <label for="elec-usage">Electricity Usage (kWh):</label>
                    <input type="number" id="elec-usage" value="50000" min="0">
                </div>
                <div class="input-group">
                    <label for="gas-usage">Natural Gas Usage (Therms):</label>
                    <input type="number" id="gas-usage" value="1200" min="0">
                </div>
                <div class="input-group">
                    <label for="flights-usage">Business Flights (Miles):</label>
                    <input type="number" id="flights-usage" value="15000" min="0">
                </div>

                <div class="controls">
                    <button id="calculate-btn">Calculate Footprint</button>
                </div>

                <div id="results-output" class="results-container" style="display: none;">
                    <h3>Total Scope 1 & 2 Emissions</h3>
                    <div class="metric-box">
                        <span id="total-co2" class="total-number">0</span>
                        <span class="unit"> Metric Tons CO2e</span>
                    </div>
                    <div id="breakdown-details" class="breakdown"></div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
