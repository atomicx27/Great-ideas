<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Carbon Footprint Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Automated Carbon Footprint Calculator</h1>
            <p>Deterministic automation for calculating CO2 emissions based on standard factors.</p>
        </header>

        <main>
            <section class="calculator-section">
                <h2>Input Data</h2>
                <div class="form-group">
                    <label for="electricity">Electricity Consumption (kWh):</label>
                    <input type="number" id="electricity" value="500">
                </div>
                <div class="form-group">
                    <label for="flights">Short-haul Flights (Count):</label>
                    <input type="number" id="flights" value="2">
                </div>
                <div class="form-group">
                    <label for="driving">Driving Distance (Miles):</label>
                    <input type="number" id="driving" value="1000">
                </div>
                <button id="calculate-btn">Calculate Footprint</button>

                <div id="results-output" class="results-container hidden">
                    <h3>Calculation Results</h3>
                    <div id="calculation-details"></div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
