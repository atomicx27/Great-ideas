<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI Global Deepfake Defense Swarm</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="../shared/llm-api.js"></script>
</head>
<body>
    <div class="container">
        <h1>AGI Global Deepfake Defense Swarm</h1>
        <p>A multi-agent orchestration system that takes a high-level goal and spawns specialized sub-agents to work in parallel.</p>

        <div class="config-section">
            <label for="apiKey">LLM API Key (OpenAI):</label>
            <input type="password" id="apiKey" placeholder="sk-...">
            <label for="highLevelGoal">High-Level Objective:</label>
            <textarea id="highLevelGoal" rows="3" placeholder="e.g., Counteract the coordinated deepfake campaign targeting the upcoming local elections."></textarea>
            <button id="orchestrateBtn">Deploy AGI Swarm</button>
        </div>

        <div id="dashboard" class="dashboard hidden">
            <div class="agent-panel master">
                <h3>Master Orchestrator</h3>
                <div id="masterLog" class="log"></div>
            </div>

            <div class="sub-agents">
                <div class="agent-panel sub-agent">
                    <h4>Threat Intel Agent</h4>
                    <div id="intelLog" class="log small-log">Waiting...</div>
                </div>
                <div class="agent-panel sub-agent">
                    <h4>Takedown Agent</h4>
                    <div id="takedownLog" class="log small-log">Waiting...</div>
                </div>
                <div class="agent-panel sub-agent">
                    <h4>Counter-Messaging Agent</h4>
                    <div id="messagingLog" class="log small-log">Waiting...</div>
                </div>
            </div>

            <div class="report-card">
                <h3>Executive Strategy Output</h3>
                <div id="finalOutput"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
