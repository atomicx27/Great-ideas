<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eisenhower Matrix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Eisenhower Matrix</h1>
            <p>Prioritize your tasks by urgency and importance.</p>
        </header>

        <div class="task-input">
            <input type="text" id="new-task-text" placeholder="Enter task description...">
            <select id="task-quadrant">
                <option value="q1">Q1: Urgent & Important (Do First)</option>
                <option value="q2">Q2: Not Urgent & Important (Schedule)</option>
                <option value="q3">Q3: Urgent & Not Important (Delegate)</option>
                <option value="q4">Q4: Not Urgent & Not Important (Don't Do)</option>
            </select>
            <button id="add-task-btn">Add Task</button>
        </div>

        <div class="matrix">
            <div class="quadrant q1" id="q1">
                <h2>Do First</h2>
                <ul class="task-list"></ul>
            </div>
            <div class="quadrant q2" id="q2">
                <h2>Schedule</h2>
                <ul class="task-list"></ul>
            </div>
            <div class="quadrant q3" id="q3">
                <h2>Delegate</h2>
                <ul class="task-list"></ul>
            </div>
            <div class="quadrant q4" id="q4">
                <h2>Don't Do</h2>
                <ul class="task-list"></ul>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
