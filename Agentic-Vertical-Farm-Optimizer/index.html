<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Vertical Farm Optimizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Agentic Vertical Farm Optimizer</h1>
            <p>LLM-driven anomaly detection and crop adjustment.</p>
        </header>

        <main>
            <section class="agent-interaction">
                <button id="analyze-btn">Analyze Crop Data</button>

                <div class="agent-log-container">
                    <h3>Agent Thought Process</h3>
                    <div id="agent-log" class="agent-log"></div>
                </div>

                <div class="agent-decision-container">
                    <h3>Final Decision</h3>
                    <div id="agent-decision" class="agent-decision">
                        <p>Waiting for analysis...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="../shared/llm-api.js"></script>
    <script src="script.js"></script>
</body>
</html>
