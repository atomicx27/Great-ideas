<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Nanobot Dispenser</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container fade-up">
        <h1>Nanobot Dispenser</h1>

        <div class="input-section">
            <label for="dosage">Requested Dosage (units):</label>
            <input type="number" id="dosage" value="250" min="0">

            <button id="dispenseBtn">Dispense</button>
        </div>

        <div class="output-section">
            <h2>Dispenser Status:</h2>
            <div id="statusOutput" class="status-box">Awaiting request...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
