<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Automated Plasma Containment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Automated Plasma Containment</h1>
        <p>A deterministic system that monitors fusion plasma parameters and triggers automated magnetic confinement adjustments based on fixed safety thresholds.</p>

        <div class="input-panel">
            <label for="temp-input">Plasma Temperature (Million K):</label>
            <input type="number" id="temp-input" value="150" step="1">

            <label for="density-input">Plasma Density (10^20 m^-3):</label>
            <input type="number" id="density-input" value="1.2" step="0.1">

            <label for="stability-input">Magnetic Stability Index (0-100):</label>
            <input type="number" id="stability-input" value="95" step="1">

            <button id="monitor-btn">Monitor Containment</button>
        </div>

        <div id="output-status" class="status">System idle...</div>
        <div id="log" class="log"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
