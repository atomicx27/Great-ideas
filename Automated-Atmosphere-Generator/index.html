<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Atmosphere Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Automated Atmosphere Generator</h1>
        <p>Deterministic Gas Mixing for Planetary Terraforming</p>
    </header>
    <main class="container">
        <section class="control-panel">
            <h2>Gas Mixer Controls</h2>
            <div class="input-group">
                <label for="co2-level">Current CO2 Level (ppm):</label>
                <input type="number" id="co2-level" value="400" />
            </div>
            <div class="input-group">
                <label for="target-co2">Target CO2 Level (ppm):</label>
                <input type="number" id="target-co2" value="800" />
            </div>
            <button id="calculate-btn" class="primary-btn">Calculate Oxygen/CO2 Injection</button>
            <p id="status-text" class="status-indicator">Status: Idle</p>
        </section>
        <section id="results-panel" class="hidden">
            <h2>Injection Plan</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Injection Type</h3>
                    <p id="injection-type">-</p>
                </div>
                <div class="stat-card">
                    <h3>Amount (Tons)</h3>
                    <p id="injection-amount">0</p>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
