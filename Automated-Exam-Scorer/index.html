<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Exam Scorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Automated Exam Scorer</h1>
            <p>Deterministic, rule-based grading of multiple-choice exams.</p>
        </header>

        <main>
            <section class="exam-section">
                <h2>Grade Exams</h2>
                <div class="controls">
                    <button id="grade-exams-btn">Grade Submissions</button>
                </div>
                <div id="results-output" class="results-container">
                    <p>Click "Grade Submissions" to process.</p>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
