<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Weather Alert System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Automated Weather Alert System</h1>
        <p>A classic automation tool using deterministic rules to issue alerts based on wind speed and rainfall.</p>

        <div class="card">
            <h2>Input Conditions</h2>
            <form id="weather-form">
                <label for="wind">Sustained Wind Speed (mph):</label>
                <input type="number" id="wind" min="0" required>

                <label for="rain">Rainfall Expected (inches):</label>
                <input type="number" id="rain" min="0" step="0.1" required>

                <button type="submit">Evaluate Alert Level</button>
            </form>
        </div>

        <div class="card result-card" id="output-card" style="display:none;">
            <h2>Alert Status</h2>
            <div id="alert-output"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
