<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Dyson Swarm Deployer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Automated Dyson Swarm Deployer</h1>
        <p>Deterministic Optimal Deployment Angle Calculator</p>
    </header>

    <main class="container">
        <section class="control-panel">
            <h2>Deployment Parameters</h2>
            <div class="input-group">
                <label for="radius-input">Orbit Radius (AU):</label>
                <input type="number" id="radius-input" value="0.5" min="0.1" max="2.0" step="0.1">
            </div>
            <div class="input-group">
                <label for="solar-wind-input">Solar Wind Speed (km/s):</label>
                <input type="number" id="solar-wind-input" value="400" min="200" max="1000" step="10">
            </div>
            <button id="calc-btn" class="primary-btn">Calculate Angle</button>
            <p id="status-text" class="status-indicator">Status: Idle</p>
        </section>

        <section class="results-panel">
            <h2>Calculated Specifications</h2>
            <div id="results-display" class="log-box">Awaiting inputs...</div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
