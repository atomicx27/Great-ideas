<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Dyson Swarm Engineer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Agentic Dyson Swarm Engineer</h1>
        <p>Autonomous AI Panel Diagnostics and Troubleshooting</p>
    </header>

    <main class="container">
        <section class="control-panel">
            <h2>Diagnostic Parameters</h2>
            <div class="input-group">
                <label for="provider-select">AI Provider:</label>
                <select id="provider-select">
                    <option value="openai">OpenAI</option>
                    <option value="anthropic">Anthropic</option>
                    <option value="ollama">Ollama (Local)</option>
                </select>
            </div>

            <div id="api-key-group" class="input-group">
                <label for="api-key">API Key:</label>
                <input type="password" id="api-key" placeholder="sk-...">
            </div>

            <div id="model-group" class="input-group" style="display: none;">
                <label for="model-name">Ollama Model:</label>
                <input type="text" id="model-name" value="llama3">
            </div>

            <div class="input-group">
                <label for="error-code-input">Panel Error Code / Telemetry Data:</label>
                <input type="text" id="error-code-input" value="ERR-749: Mirror array misalignment detected at segment 4.">
            </div>

            <button id="troubleshoot-btn" class="primary-btn">Initialize Agent</button>
        </section>

        <section class="results-panel">
            <h2>Agent Operations Log</h2>
            <div id="output-log" class="log-box"></div>
        </section>
    </main>

    <script src="../shared/llm-api.js"></script>
    <script src="script.js"></script>
</body>
</html>
