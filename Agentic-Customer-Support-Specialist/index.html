<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Customer Support</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="app-header">
        <div class="logo">
            <i class="fa-solid fa-headset"></i>
            <h1>Support Specialist <span class="badge">Agentic-AI</span></h1>
        </div>
        <button id="settings-btn" class="btn btn-outline"><i class="fa-solid fa-gear"></i> LLM Config</button>
    </header>

    <div id="settings-panel" class="settings-panel hidden">
        <div class="panel-header">
            <h2>LLM Configuration (BYOK)</h2>
            <button id="close-settings" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="form-group">
            <label>Provider</label>
            <select id="llm-provider">
                <option value="openai">OpenAI</option>
                <option value="anthropic">Anthropic</option>
                <option value="ollama">Ollama (Local)</option>
            </select>
        </div>
        <div id="api-key-container" class="form-group">
            <label>API Key</label>
            <input type="password" id="api-key" placeholder="sk-...">
        </div>
        <div id="ollama-url-container" class="form-group hidden">
            <label>Ollama Host</label>
            <input type="text" id="ollama-url" value="http://localhost:11434">
        </div>
    </div>

    <main class="container">
        <div class="chat-container">
            <div class="chat-box" id="chat-box">
                <div class="message system">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="content">Hello! I am your AI Support Specialist. I have access to order tracking, refunds, and address updates. How can I assist you today?</div>
                </div>
            </div>

            <div class="internal-thoughts" id="internal-thoughts">
                <strong>Agent Thought Process:</strong> <span id="thought-content">Waiting for input...</span>
            </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="e.g., Where is my order #12345?">
                <button id="send-btn" class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
