<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Sales Development Rep</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Agentic Sales Development Rep (SDR)</h1>

        <div class="api-setup">
            <h3>API Configuration</h3>
            <select id="provider">
                <option value="openai">OpenAI</option>
                <option value="anthropic">Anthropic</option>
                <option value="ollama">Ollama (Local)</option>
            </select>
            <input type="password" id="apiKey" placeholder="Enter API Key / URL">
            <input type="text" id="model" placeholder="Model (e.g., gpt-4, claude-3)">
        </div>

        <div class="input-section">
            <label for="prospectContext">Prospect Context (e.g., LinkedIn bio or Company website text):</label>
            <textarea id="prospectContext" rows="4" placeholder="e.g., TechCorp recently raised $10M Series A and is looking to expand their engineering team..."></textarea>

            <label for="productValue">Our Product Value Proposition:</label>
            <textarea id="productValue" rows="3" placeholder="e.g., We provide automated recruiting software that cuts hiring time by 50%."></textarea>

            <button id="draft-btn">Run Autonomous SDR Agent</button>
        </div>

        <div class="output-section">
            <h2>Agent Log</h2>
            <div id="agent-log" class="log-box"></div>

            <h2>Personalized Outreach Draft</h2>
            <div id="result" class="result-box">Waiting for prospect data...</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <script src="../shared/llm-api.js"></script>
    <script src="script.js"></script>
</body>
</html>
