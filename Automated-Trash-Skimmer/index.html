<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Automated Trash Skimmer</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #f9f9f9; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .status-box { padding: 15px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ddd; background: #fff; }
        .alert { background: #fee; border-color: #fcc; color: #c00; }
        .ok { background: #efe; border-color: #cfc; color: #0c0; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .metrics { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Automated Trash Skimmer</h1>
        <p>Simulation of a deterministic ocean trash skimmer monitoring battery and bin capacity.</p>

        <div id="status" class="status-box ok">Status: Skimming active.</div>

        <div class="metrics">
            Battery: <span id="battery">100</span>%<br>
            Bin Capacity: <span id="capacity">0</span>%
        </div>
        <br>
        <button id="simulate-btn">Simulate 1 Hour of Skimming</button>
        <button id="reset-btn">Reset at Dock</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
