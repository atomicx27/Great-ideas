<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Carbon Capture Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Automated Carbon Capture Controller</h1>
        <div class="card">
            <form id="capture-form">
                <div class="form-group">
                    <label for="co2-level">CO2 Concentration (ppm):</label>
                    <input type="number" id="co2-level" value="450" required style="width: 100%;">
                </div>
                <div class="form-group">
                    <label for="filter-status">Filter Saturation (%):</label>
                    <input type="number" id="filter-status" value="60" required style="width: 100%;">
                </div>
                <button type="submit">Evaluate System Status</button>
            </form>
            <div id="output-card" style="display:none; margin-top:20px;">
                <h3>System Response:</h3>
                <div id="alert-output"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
