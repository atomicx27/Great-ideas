<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Carbon Offset Trader</title>
    <link rel="stylesheet" href="style.css">
    <!-- Include DOMPurify for sanitization -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Agentic Carbon Offset Trader</h1>
            <p>Autonomous AI Agent managing carbon credit trading.</p>
        </header>

        <main>
            <section class="config-section">
                <h2>LLM Configuration (BYOK)</h2>
                <div class="form-group">
                    <label for="provider-select">Provider:</label>
                    <select id="provider-select">
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="ollama">Ollama (Local)</option>
                    </select>
                </div>
                <div class="form-group" id="api-key-group">
                    <label for="api-key">API Key:</label>
                    <input type="password" id="api-key" placeholder="Enter API Key">
                </div>
                <div class="form-group" id="model-group" style="display: none;">
                    <label for="model">Model Name (for Ollama):</label>
                    <input type="text" id="model" placeholder="e.g. llama3">
                </div>
            </section>

            <section class="task-section">
                <h2>Trading Goals</h2>
                <div class="form-group">
                    <label for="budget">Budget ($):</label>
                    <input type="number" id="budget" value="1000">
                </div>
                <div class="form-group">
                    <label for="offset-target">Target Offset (Tons CO2):</label>
                    <input type="number" id="offset-target" value="50">
                </div>
                <button id="run-agent-btn">Deploy Trading Agent</button>
            </section>

            <section class="agent-output-section">
                <h2>Agent Activity Log & Results</h2>
                <div id="output-log" class="log-container">
                    <p class="log-info">Waiting for trading goals...</p>
                </div>
                <div id="final-results" class="results-container hidden">
                    <!-- Final trading results will appear here -->
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
