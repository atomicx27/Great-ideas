<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Carbon Offset Trader</title>
    <link rel="stylesheet" href="style.css">
    <script src="../shared/llm-api.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Agentic Carbon Offset Trader</h1>
            <p>Autonomous AI Agent for dynamic portfolio optimization and carbon credit trading.</p>
        </header>

        <main>
            <section class="config-section">
                <h2>API Configuration</h2>
                <div class="input-group">
                    <label for="llm-provider">LLM Provider:</label>
                    <select id="llm-provider">
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="ollama" selected>Ollama (Local)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="api-key">API Key (if required):</label>
                    <input type="password" id="api-key" placeholder="Enter API Key">
                </div>
            </section>

            <section class="agent-section">
                <h2>Trading Goal</h2>
                <div class="input-group">
                    <label for="trade-goal">Objective:</label>
                    <textarea id="trade-goal" rows="2">Offset 5,000 MT CO2e using a mix of Forestry and Direct Air Capture credits under a $150,000 budget.</textarea>
                </div>
                <div class="controls">
                    <button id="start-trading-btn">Start Autonomous Trading</button>
                </div>
                <div id="agent-state" class="agent-state-container">
                    <p>Status: <span id="status-text">Idle</span></p>
                    <div id="agent-log" class="log-container"></div>
                </div>
                <div id="trade-result" class="result-container"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
