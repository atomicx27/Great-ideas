<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Telescope Positioner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Automated Telescope Positioner</h1>
            <p>Deterministic calculations for celestial targeting (Right Ascension & Declination).</p>
        </header>

        <main>
            <div class="controls">
                <button id="calculate-btn">Calculate Trajectory</button>
            </div>
            <div class="log-container">
                <h2>Motor Commands</h2>
                <div id="log-output" class="log-output"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
