<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI SOC Incident Responder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AGI SOC Incident Responder (Multi-Agent Swarm)</h1>
        <div class="header-actions">
            <button id="settings-btn" class="btn secondary">BYOK LLM Settings</button>
        </div>
    </header>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>LLM Settings</h2>
            <div class="form-group">
                <label for="llm-provider">Provider</label>
                <select id="llm-provider">
                    <option value="ollama">Ollama (Local/Private)</option>
                    <option value="openai">OpenAI</option>
                    <option value="anthropic">Anthropic</option>
                </select>
            </div>
            <div id="api-key-group" class="form-group hidden">
                <label for="api-key">API Key</label>
                <input type="password" id="api-key">
            </div>
            <div id="ollama-url-group" class="form-group">
                <label for="ollama-url">Ollama Base URL</label>
                <input type="text" id="ollama-url" value="http://localhost:11434">
            </div>
            <button id="save-settings" class="btn primary">Save</button>
        </div>
    </div>

    <main class="dashboard">
        <section class="alerts-section">
            <h2>Active Cloud / Telco Threats</h2>
            <ul id="alerts-list" class="alerts-list">
                <!-- JS Fills -->
            </ul>
        </section>

        <section id="orchestrator-panel" class="orchestrator-panel hidden">
            <div class="panel-header">
                <h2 id="incident-title">Incident Analysis</h2>
                <button id="close-panel" class="close-btn-panel">&times;</button>
            </div>

            <div class="swarm-visualization">
                <h3>Agent Swarm Status</h3>
                <div class="agent-nodes">
                    <div class="node orchestrator">Master Orchestrator</div>
                    <div class="node-connections">
                        <div id="agent-intel" class="node sub-agent pending">Threat Intel Agent</div>
                        <div id="agent-forensics" class="node sub-agent pending">Forensics Agent</div>
                        <div id="agent-containment" class="node sub-agent pending">Containment Agent</div>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button id="trigger-swarm-btn" class="btn primary full-width">Deploy AGI Swarm to Investigate</button>
            </div>

            <div id="final-report" class="final-report hidden">
                <h3>Executive Incident Report & Playbook</h3>
                <div id="report-content" class="content-box"></div>
                <div class="actions mt-2">
                    <button class="btn success">Execute Containment Playbook</button>
                </div>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
