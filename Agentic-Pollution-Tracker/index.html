<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agentic Pollution Tracker</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #f9f9f9; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .log-box { padding: 15px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ddd; background: #222; color: #0f0; font-family: monospace; height: 300px; overflow-y: auto; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .controls { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Agentic Pollution Tracker</h1>
        <p>This agent autonomously evaluates ocean currents and microplastic densities to chart an optimal cleanup path.</p>

        <div class="controls">
            <button id="start-btn">Start Autonomous Tracking</button>
            <button id="clear-btn">Clear Logs</button>
        </div>

        <div id="agent-log" class="log-box"></div>
    </div>
    <script src="../shared/llm-api.js"></script>
    <script src="script.js"></script>
</body>
</html>
