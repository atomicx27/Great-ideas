<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Space Debris Evader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Agentic Space Debris Evader</h1>
            <p>Space Exploration - Agentic AI Level (Simulated)</p>
        </header>

        <main>
            <section class="controls">
                <p>Bot Goal: <strong>Spacecraft Survival</strong></p>
                <button id="trigger-debris-btn">Simulate Incoming Debris Warning</button>
            </section>

            <section class="agent-activity">
                <h2>AI Copilot Thought Process</h2>
                <div id="agent-log" class="log-window">
                    <p class="status-msg">Radar sweeping... orbital path clear.</p>
                </div>
            </section>

            <section class="action-panel">
                <h2>Autonomous Decision</h2>
                <div id="agent-decision" class="decision-window">
                    <p>Awaiting context...</p>
                </div>
            </section>
        </main>
    </div>

    <div id="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
