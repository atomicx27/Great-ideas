<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AGI Smart City Traffic Orchestrator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>AGI Smart City Traffic Orchestrator</h1>
        <p>Simulating AGI orchestrating multiple sub-agents to resolve a city-wide traffic crisis.</p>

        <button id="start-swarm-btn">Initialize Crisis Response</button>
        <p id="master-status" class="status-text">Status: Idle</p>

        <div id="swarm-container" class="swarm" style="display:none;">
            <div id="agent-emergency" class="agent-card">
                <h3>🚑 Emergency Services Agent</h3>
                <p class="agent-status">Pending...</p>
                <div class="agent-output"></div>
            </div>
            <div id="agent-routing" class="agent-card">
                <h3>🚦 Dynamic Routing Agent</h3>
                <p class="agent-status">Pending...</p>
                <div class="agent-output"></div>
            </div>
            <div id="agent-transit" class="agent-card">
                <h3>🚌 Public Transit Agent</h3>
                <p class="agent-status">Pending...</p>
                <div class="agent-output"></div>
            </div>
        </div>

        <div id="synthesis-node" style="display:none; margin-top:20px;">
            <h3>City-Wide Executive Action Plan</h3>
            <div id="final-strategy" class="strategy-output"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
