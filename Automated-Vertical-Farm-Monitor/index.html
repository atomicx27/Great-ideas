<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Vertical Farm Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Automated Vertical Farm Monitor</h1>
            <p>Deterministic logging of pH and EC values.</p>
        </header>
        <main>
            <div class="controls">
                <button id="simulate-btn">Simulate Sensor Data</button>
            </div>
            <div class="log-container">
                <h2>Sensor Logs</h2>
                <div id="log-output" class="log-output"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
