<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agentic Drug Designer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Agentic Drug Designer</h1>
        <p>This agent autonomously optimizes a drug candidate using simulated binding affinity and toxicity tools.</p>

        <div class="controls">
            <input type="text" id="target-input" value="Protein Kinase C" style="width: 350px; padding: 8px;">
            <button id="design-btn">Start Optimization Agent</button>
        </div>

        <div id="output-log" class="log-container"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
