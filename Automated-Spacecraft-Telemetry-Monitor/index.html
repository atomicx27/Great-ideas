<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Spacecraft Telemetry Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Automated Spacecraft Telemetry Monitor</h1>
            <p>Deterministic Space System Monitoring</p>
        </header>

        <main>
            <section class="form-section">
                <h2>Input Manual Telemetry</h2>
                <form id="telemetry-form">
                    <div class="form-group">
                        <label for="oxygen">Oxygen Level (%):</label>
                        <input type="number" id="oxygen" required step="0.1" value="21.0">
                        <small>Safe: > 19.5%</small>
                    </div>
                    <div class="form-group">
                        <label for="battery">Main Battery (%):</label>
                        <input type="number" id="battery" required step="1" value="85">
                        <small>Safe: > 40%</small>
                    </div>
                    <div class="form-group">
                        <label for="pressure">Cabin Pressure (kPa):</label>
                        <input type="number" id="pressure" required step="0.1" value="101.3">
                        <small>Safe: 90 - 105 kPa</small>
                    </div>
                    <button type="submit">Analyze Telemetry</button>
                </form>
            </section>

            <section class="result-section">
                <h2>System Status</h2>
                <div id="status-output" class="output-container">
                    <p>Awaiting telemetry scan...</p>
                </div>
            </section>
        </main>
    </div>

    <div id="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
