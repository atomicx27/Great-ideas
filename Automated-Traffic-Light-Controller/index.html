<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Automated Traffic Light Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Automated Traffic Light Controller</h1>
        <p>Simulation of a deterministic traffic light based on a timer and basic pedestrian button.</p>

        <div class="traffic-light">
            <div id="red" class="light red"></div>
            <div id="yellow" class="light yellow"></div>
            <div id="green" class="light green"></div>
        </div>

        <button id="pedestrian-btn">Pedestrian Crossing Button</button>
        <p id="status-message">Status: Normal Operation</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
