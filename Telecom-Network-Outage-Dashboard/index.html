<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telecom Network Outage Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- Leaflet for map integration -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
    <header>
        <h1>Network Outage Dashboard</h1>
        <div class="system-status">
            <span>System Status: </span>
            <span id="overall-status" class="status-indicator status-online">Online</span>
        </div>
    </header>

    <main class="dashboard-container">
        <section class="map-section">
            <h2>Cell Tower Map</h2>
            <div id="map"></div>
        </section>

        <aside class="info-section">
            <div class="stats-cards">
                <div class="card">
                    <h3>Active Outages</h3>
                    <p id="outage-count">0</p>
                </div>
                <div class="card">
                    <h3>Crews Dispatched</h3>
                    <p id="crews-count">0</p>
                </div>
            </div>

            <div class="tower-list-container">
                <h2>Tower Status</h2>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="offline">Offline</button>
                    <button class="filter-btn" data-filter="maintenance">Maintenance</button>
                </div>
                <ul id="tower-list" class="tower-list">
                    <!-- Towers will be rendered here via JS -->
                </ul>
            </div>
        </aside>
    </main>

    <script src="app.js"></script>
</body>
</html>
