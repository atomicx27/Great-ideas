<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agentic Drone Navigator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Agentic Drone Navigator</h1>
        <p>This agent autonomously navigates to a destination using simulated tools for weather and obstacle detection.</p>

        <div class="controls">
            <input type="text" id="destination-input" value="Medical Center North" style="width: 350px; padding: 8px;">
            <button id="navigate-btn">Start Navigation Agent</button>
        </div>

        <div id="output-log" class="log-container"></div>
    </div>
        <header>
            <h1>Agentic Drone Navigator</h1>
            <p>Autonomous AI Agent for dynamic mid-flight route recalibration.</p>
        </header>

        <main>
            <section class="trigger-section">
                <button id="launch-agent-btn">Deploy Drone (Mid-Flight Anomaly Simulated)</button>
            </section>

            <section class="agent-interaction">
                <div class="agent-log-container">
                    <h3>Agent Thought Process</h3>
                    <div id="agent-log" class="agent-log"></div>
                </div>

                <div class="agent-decision-container">
                    <h3>Final Decision</h3>
                    <div id="agent-decision" class="agent-decision">
                        <p>Waiting for drone deployment...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
