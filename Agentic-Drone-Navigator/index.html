<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agentic Drone Navigator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Agentic Drone Navigator</h1>
        <p>This agent autonomously navigates to a destination using simulated tools for weather and obstacle detection.</p>

        <div class="controls">
            <input type="text" id="destination-input" value="Medical Center North" style="width: 350px; padding: 8px;">
            <button id="navigate-btn">Start Navigation Agent</button>
        </div>

        <div id="output-log" class="log-container"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
