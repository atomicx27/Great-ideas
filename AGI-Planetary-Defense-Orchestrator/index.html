<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI Planetary Defense Orchestrator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header>
        <h1>AGI Planetary Defense Orchestrator</h1>
        <p>Multi-Agent Global Crisis Management</p>
    </header>

    <main class="container">
        <section class="control-panel">
            <h2>Crisis Scenario Parameters</h2>
            <div class="input-group">
                <label for="scenario-input">Threat Scenario:</label>
                <textarea id="scenario-input" rows="4">A fragmented cometary swarm consisting of 12 distinct objects ranging from 50m to 800m is on a collision course with Earth. Time to impact: 4 months. Impact zones span North America, Europe, and the Pacific Ocean. Global defense assets are limited.</textarea>
            </div>

            <hr>

            <div class="input-group">
                <label for="llm-provider">Master LLM Provider:</label>
                <select id="llm-provider">
                    <option value="openai">OpenAI</option>
                    <option value="anthropic">Anthropic</option>
                    <option value="ollama">Ollama (Local)</option>
                </select>
            </div>
            <div class="input-group">
                <label for="api-key">API Key / Base URL:</label>
                <input type="password" id="api-key" placeholder="Enter key or http://localhost:11434">
            </div>

            <button id="orchestrate-btn" class="primary-btn">Initialize Multi-Agent Orchestration</button>
            <p id="status-text" class="status-indicator">Status: Awaiting Initialization</p>
        </section>

        <section class="results-panel">
            <h2>Swarm Orchestration Log</h2>
            <div id="results-display" class="log-box">Awaiting macro-goal initialization...</div>
        </section>
    </main>

    <script src="../shared/llm-api.js"></script>
    <script src="script.js"></script>
</body>
</html>
