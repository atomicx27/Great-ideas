<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Quantum Circuit Optimizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Agentic Quantum Circuit Optimizer</h1>
            <p>Autonomous AI Agent for optimizing quantum gate sequences.</p>
        </header>
        <main>
            <div class="card">
                <div class="form-group">
                    <label for="circuit-depth">Input Circuit Depth:</label>
                    <input type="text" id="circuit-depth" value="500 gates" style="width: 100%;">
                </div>
                <button id="run-btn">Start Autonomous Optimization</button>
            </div>

            <div class="log-container">
                <h3>Agent Activity Log</h3>
                <div id="output-log" class="output-log"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
