<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI Vertical Farm Orchestrator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AGI Vertical Farm Orchestrator</h1>
            <p>Multi-Agent Swarm Orchestration for facility-wide optimization.</p>
        </header>

        <main>
            <section class="scenario-section">
                <h2>Set Orchestrator Goal</h2>
                <div class="form-group">
                    <label for="goal-input">High-Level Goal:</label>
                    <textarea id="goal-input" rows="3">Maximize yield of basil in Sector 4 while reducing overall energy consumption by 15%.</textarea>
                </div>
                <button id="start-orchestrator-btn">Deploy Swarm</button>
            </section>

            <section class="swarm-visualization">
                <h3>Swarm Activity</h3>
                <div class="agent-grid">
                    <div class="agent-card" id="agent-master">
                        <h4>Master Orchestrator</h4>
                        <p class="status">Idle</p>
                    </div>
                    <div class="agent-card" id="agent-climate">
                        <h4>Climate Sub-Agent</h4>
                        <p class="status">Waiting</p>
                    </div>
                    <div class="agent-card" id="agent-harvest">
                        <h4>Harvest Sub-Agent</h4>
                        <p class="status">Waiting</p>
                    </div>
                </div>
            </section>

            <section class="agent-output">
                <h3>Swarm Report</h3>
                <div id="output-log" class="log-container"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
