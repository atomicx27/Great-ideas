<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Personal Shopper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Agentic Personal Shopper</h1>
        <p>This Agentic AI autonomously selects clothing items from an inventory based on your style preferences.</p>

        <div class="input-group">
            <label for="style-input">Enter style or occasion (e.g., 'casual', 'formal'):</label>
            <input type="text" id="style-input" value="casual">
        </div>

        <button id="shop-btn">Find Outfit</button>

        <div class="log-area" id="log-area">
            <!-- Agent logs will appear here -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
