<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AGI Synthetic Life Orchestrator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load DOMPurify -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>AGI Synthetic Life Orchestrator</h1>
            <p>Multi-Agent Swarm for Synthetic Organism Design.</p>
        </header>

        <main>
            <section class="config-section">
                <div class="form-group">
                    <label for="provider-select">LLM Provider:</label>
                    <select id="provider-select">
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="ollama" selected>Ollama (Local)</option>
                    </select>
                </div>
                <div class="form-group" id="api-key-group" style="display: none;">
                    <label for="api-key">API Key:</label>
                    <input type="password" id="api-key" placeholder="Enter API key">
                </div>
                <div class="form-group" id="model-group">
                    <label for="model-name">Ollama Model:</label>
                    <input type="text" id="model-name" value="llama3">
                </div>
                <button id="start-swarm-btn">Initialize Design Swarm</button>
            </section>

            <section class="orchestrator-status">
                <h2>Master Orchestrator</h2>
                <p id="master-status" class="status-text">Awaiting input...</p>
            </section>

            <section id="swarm-container" class="swarm-grid hidden">
                <div class="agent-card" id="agent-genome">
                    <h3>🧬 Genome Designer</h3>
                    <p class="agent-status">Pending...</p>
                    <div class="agent-output"></div>
                </div>
                <div class="agent-card" id="agent-metabolic">
                    <h3>⚗️ Metabolic Engineer</h3>
                    <p class="agent-status">Pending...</p>
                    <div class="agent-output"></div>
                </div>
                <div class="agent-card" id="agent-evo">
                    <h3>⏳ Evolutionary Simulator</h3>
                    <p class="agent-status">Pending...</p>
                    <div class="agent-output"></div>
                </div>
            </section>

            <section id="synthesis-node" class="synthesis-container hidden">
                <h2>Final Synthetic Blueprint</h2>
                <div id="final-strategy" class="strategy-output"></div>
            </section>
        </main>
    </div>
    <script src="../shared/llm-api.js"></script>
    <script src="script.js"></script>
</body>
</html>
