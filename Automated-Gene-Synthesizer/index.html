<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Automated Gene Synthesizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Automated Gene Synthesizer</h1>
            <p>Deterministic transcription of DNA to mRNA sequences.</p>
        </header>

        <main>
            <section class="transcription-section">
                <h2>DNA Input</h2>
                <div class="form-group">
                    <label for="dna-sequence">Enter DNA Sequence (A, T, C, G):</label>
                    <input type="text" id="dna-sequence" value="ATCGGCTA">
                </div>
                <button id="transcribe-btn">Transcribe to mRNA</button>

                <div id="results-output" class="results-container hidden">
                    <h3>Synthesized mRNA Sequence</h3>
                    <p id="mrna-output" class="sequence-output"></p>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
