<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Anti-Poaching Patrol</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Agentic Anti-Poaching Patrol</h1>
        <p>This Agentic AI autonomously investigates acoustic anomalies to protect wildlife.</p>

        <div class="input-group">
            <label for="anomaly-input">Reported Acoustic Anomaly:</label>
            <input type="text" id="anomaly-input" value="Loud crack resembling a gunshot in Sector 7">
        </div>

        <button id="investigate-btn">Initiate Autonomous Investigation</button>

        <div class="log-area" id="output-log">
            <!-- Agent execution logs will appear here -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
