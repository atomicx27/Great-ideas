<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Drone Flight Logger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Automated Drone Flight Logger</h1>
            <p>Deterministic logging of flight telemetry data</p>
        </header>

        <main>
            <div class="controls">
                <button id="simulate-flight-btn">Simulate Flight Data</button>
            </div>

            <div class="log-container">
                <h2>Flight Logs</h2>
                <div id="log-output" class="log-output">
                    <!-- Logs will appear here -->
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
