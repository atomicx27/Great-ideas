<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI Vertical Farming Orchestrator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="../shared/llm-api.js"></script>
</head>
<body>
    <div class="container">
        <h1>AGI Vertical Farming Orchestrator</h1>
        <p>A multi-agent swarm orchestrator that handles high-level, ambiguous farming network goals.</p>

        <div class="config-section">
            <label for="apiKey">LLM API Key (OpenAI):</label>
            <input type="password" id="apiKey" placeholder="sk-...">
            <label for="highLevelGoal">High-Level Objective:</label>
            <textarea id="highLevelGoal" rows="3" placeholder="e.g., Design and optimize a vertical farm network for New York City to maximize local greens production while minimizing energy grid strain."></textarea>
            <button id="orchestrateBtn">Deploy AGI Orchestrator</button>
        </div>

        <div id="dashboard" class="dashboard hidden">
            <div class="agent-panel master">
                <h3>Master Orchestrator</h3>
                <div id="masterLog" class="log"></div>
            </div>

            <div class="sub-agents">
                <div class="agent-panel sub-agent">
                    <h4>Logistics Agent</h4>
                    <div id="logisticsLog" class="log small-log">Waiting...</div>
                </div>
                <div class="agent-panel sub-agent">
                    <h4>Resource Agent</h4>
                    <div id="resourceLog" class="log small-log">Waiting...</div>
                </div>
                <div class="agent-panel sub-agent">
                    <h4>Agronomy Agent</h4>
                    <div id="agronomyLog" class="log small-log">Waiting...</div>
                </div>
            </div>

            <div class="report-card">
                <h3>Executive Strategy Output</h3>
                <div id="finalOutput"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
