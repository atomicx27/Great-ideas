<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Podcast Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Automated Podcast Editor</h1>
            <p>Deterministic, rule-based audio processing.</p>
        </header>

        <main>
            <section class="editor-section">
                <h2>Process Audio File</h2>
                <div class="controls">
                    <button id="process-audio-btn">Remove Silence & Normalize</button>
                </div>
                <div id="results-output" class="results-container">
                    <p>Click the button to process the audio buffer.</p>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
