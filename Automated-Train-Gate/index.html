<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Train Gate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Automated Train Gate</h1>
            <p>Public Transit - Automation Level</p>
        </header>

        <main>
            <section class="controls">
                <button id="train-approach-btn">Train Approaching</button>
            </section>

            <section class="gate-status">
                <h2>Gate Status</h2>
                <div id="gate-indicator" class="open">OPEN</div>
                <p id="status-message">Status: Clear</p>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
