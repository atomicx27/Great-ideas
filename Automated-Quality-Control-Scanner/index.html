<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Quality Control Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Automated Quality Control Scanner</h1>
            <p>Smart Manufacturing - Automation level</p>
        </header>

        <main>
            <section class="form-section">
                <h2>Product Sensor Data</h2>
                <form id="qc-form">
                    <div class="form-group">
                        <label for="temperature">Temperature (°C):</label>
                        <input type="number" id="temperature" required step="0.1" value="75.0">
                        <small>Acceptable: 60 - 80 °C</small>
                    </div>
                    <div class="form-group">
                        <label for="size">Size (mm):</label>
                        <input type="number" id="size" required step="0.1" value="10.0">
                        <small>Acceptable: 9.5 - 10.5 mm</small>
                    </div>
                    <button type="submit">Scan Product</button>
                </form>
            </section>

            <section class="result-section">
                <h2>Inspection Result</h2>
                <div id="qc-output" class="output-container">
                    <p>Enter sensor data to scan the product.</p>
                </div>
            </section>
        </main>
    </div>

    <div id="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
