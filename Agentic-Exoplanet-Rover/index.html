<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Exoplanet Rover</title>
    <link rel="stylesheet" href="style.css">
    <!-- Include DOMPurify -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="../shared/llm-api.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Agentic Exoplanet Rover</h1>
            <p>Autonomous navigation and sample evaluation using Agentic AI.</p>
        </header>

        <section class="api-setup">
            <div class="panel">
                <h2>LLM Configuration</h2>
                <div class="input-group">
                    <label for="provider-select">Provider:</label>
                    <select id="provider-select">
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="ollama">Ollama</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="api-key-input">API Key / Base URL:</label>
                    <input type="password" id="api-key-input" placeholder="Enter API Key or URL">
                </div>
            </div>
        </section>

        <section class="controls">
            <button id="survey-btn">Survey Surroundings</button>
        </section>

        <section class="dashboard">
            <div class="panel">
                <h2>Navigation Plan</h2>
                <div id="nav-display" class="data-display">Awaiting survey...</div>
            </div>

            <div class="panel">
                <h2>Sample Evaluation</h2>
                <div id="sample-display" class="data-display">Awaiting evaluation...</div>
            </div>
        </section>

        <section class="log-section">
            <h2>Rover Log</h2>
            <div id="rover-log" class="log-container"></div>
        </section>
    </div>
</body>
</html>
