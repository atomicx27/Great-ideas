<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Financial Report Compiler</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Automated Financial Report Compiler</h1>
            <p>Deterministic, rule-based financial data aggregation and reporting.</p>
        </header>

        <main>
            <section class="report-section">
                <h2>Quarterly Financial Report Generator</h2>
                <div class="controls">
                    <button id="generate-report-btn">Generate Report</button>
                </div>
                <div id="report-output" class="report-container">
                    <p>Click "Generate Report" to compile data.</p>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
