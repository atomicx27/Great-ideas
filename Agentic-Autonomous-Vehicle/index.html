<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agentic Autonomous Vehicle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Agentic Autonomous Vehicle Simulator</h1>
        <p>This agent perceives its environment using simulated sensors and decides actions to navigate safely.</p>

        <div class="controls">
            <button id="run-agent-btn">Start Navigation</button>
            <input type="text" id="environment-prompt" value="Approaching crosswalk. Pedestrian is waiting." style="width: 300px; padding: 5px;">
        </div>

        <div id="output-log" class="log-container"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
