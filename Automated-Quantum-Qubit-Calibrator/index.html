<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Quantum Qubit Calibrator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Automated Quantum Qubit Calibrator</h1>
        <div class="card">
            <form id="calibration-form">
                <div class="form-group">
                    <label for="error-rate">Qubit Error Rate (%):</label>
                    <input type="number" id="error-rate" value="1.5" step="0.1" required style="width: 100%;">
                </div>
                <div class="form-group">
                    <label for="coherence-time">Coherence Time (μs):</label>
                    <input type="number" id="coherence-time" value="50" step="1" required style="width: 100%;">
                </div>
                <button type="submit">Run Calibration Check</button>
            </form>
            <div id="output-card" style="display:none; margin-top:20px;">
                <h3>System Response:</h3>
                <div id="alert-output"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
