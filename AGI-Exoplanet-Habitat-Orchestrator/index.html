<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI Exoplanet Habitat Orchestrator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Include DOMPurify -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="../shared/llm-api.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>AGI Exoplanet Habitat Orchestrator</h1>
            <p>Multi-agent swarm for holistic habitat management.</p>
        </header>

        <section class="api-setup">
            <div class="panel">
                <h2>Orchestrator API Configuration</h2>
                <div class="input-group">
                    <label for="provider-select">Provider:</label>
                    <select id="provider-select">
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="ollama">Ollama</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="api-key-input">API Key / Base URL:</label>
                    <input type="password" id="api-key-input" placeholder="Enter API Key or URL">
                </div>
            </div>
        </section>

        <section class="controls">
            <button id="orchestrate-btn">Run Habitat Diagnostics & Orchestration</button>
        </section>

        <section class="dashboard">
            <div class="panel">
                <h2>Life Support Sub-Agent</h2>
                <div id="life-display" class="data-display sub-agent">Awaiting orders...</div>
            </div>

            <div class="panel">
                <h2>Resource Sub-Agent</h2>
                <div id="resource-display" class="data-display sub-agent">Awaiting orders...</div>
            </div>

            <div class="panel">
                <h2>Structural Sub-Agent</h2>
                <div id="structure-display" class="data-display sub-agent">Awaiting orders...</div>
            </div>
        </section>

        <section class="governor-section">
            <h2>AGI Governor Synthesis</h2>
            <div id="governor-display" class="data-display governor">Awaiting sub-agent reports...</div>
        </section>
    </div>
</body>
</html>
