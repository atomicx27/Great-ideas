<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agentic Asteroid Prospector</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #000; color: #0f0; }
        .container { max-width: 800px; margin: 0 auto; background: #111; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        .log-box { padding: 15px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #0f0; background: #000; font-family: monospace; height: 350px; overflow-y: auto; }
        button { padding: 10px 15px; background: #0f0; color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 10px;}
        button:hover { background: #0c0; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        h1 { border-bottom: 2px solid #0f0; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Agentic Asteroid Prospector</h1>
        <p>Goal: Maximize rare-earth mineral discovery. Assessing asteroid target.</p>

        <div>
            <button id="prospect-btn">Initiate Prospecting Sequence</button>
            <button id="clear-btn">Clear Terminal</button>
        </div>
        <br>

        <div id="agent-log" class="log-box"></div>
    </div>
    <script src="../shared/llm-api.js"></script>
    <script src="script.js"></script>
</body>
</html>
